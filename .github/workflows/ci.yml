name: ExpoPay CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/escrow/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Soroban contract (wasm)
        working-directory: contracts/escrow
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            --no-default-features

      - name: Run contract tests
        working-directory: contracts/escrow
        run: cargo test -- --nocapture

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Vercel deployment via Deploy Hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "Vercel API response: $response"
          if [ "$response" != "201" ]; then
            echo "Deploy hook returned unexpected status: $response"
            exit 1
          fi
          echo "✅ Vercel deployment triggered successfully"
