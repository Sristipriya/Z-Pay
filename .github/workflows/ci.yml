name: ExpoPay CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/escrow/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Soroban contract (wasm)
        working-directory: contracts/escrow
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            --no-default-features

      - name: Run contract tests
        working-directory: contracts/escrow
        run: cargo test -- --nocapture

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy to Vercel
        run: |
          npx vercel@latest --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-env NEXT_PUBLIC_NETWORK=testnet \
            --build-env NEXT_PUBLIC_ESCROW_CONTRACT_ID=${{ secrets.NEXT_PUBLIC_ESCROW_CONTRACT_ID }} \
            --build-env NEXT_PUBLIC_TOKEN_CONTRACT_ID=${{ secrets.NEXT_PUBLIC_TOKEN_CONTRACT_ID }} \
            --build-env NEXT_PUBLIC_APP_URL=https://expopay.vercel.app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
